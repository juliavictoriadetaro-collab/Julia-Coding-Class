<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L06 Personal Detail Form</title>
    </head>
    <body>
        <h1>Personal Details Form</h1>

        <form>
            <label>Name</label> <br>
            <input type="text" id="name"> <br><br>

            <label>Email Id</label> <br>
            <input type="text" id="email"> <br><br>

            <label>Password (This will be hidden)</label> <br>
            <input type="password" id="contact"> <br><br>

            <label>Gender</label><br>
            <input type="radio" id="female" name="gender" value="Female">Female <br>
            <input type="radio" id="male" name="gender" value="Male">Male <br><br>

            <label>Favourite City</label><br>
            <input type="checkbox" id="City" value="Manila">Manila<br>
            <input type="checkbox" id="City" value="Bicol">Bicol<br><br>
            
            <input type="Submit">
        </form>
    </body>
</html>
