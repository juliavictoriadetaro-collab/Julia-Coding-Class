<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L06 HW Elaborate your registration form entries</title>
    </head>
    <body>
         <legend>Personal Information</legend>

            <form>
                <label>Name</label> <br>
                <input type="text" id="name"> <br><br>

                <label>Address</label> <br>
                <input type="text" id="address"> <br><br>

                <label>School</label> <br>
                <input type="text" id="school"> <br><br>

                <label>Email Id</label> <br>
                <input type="text" id="email"> <br><br>

                <label>Password (This will be hidden)</label> <br>
                <input type="password" id="contact"> <br><br>

                <label>Gender</label><br>
                <input type="radio" id="female" name="gender" value="Female">Female <br>
                <input type="radio" id="male" name="gender" value="Male">Male <br><br>

                <label>Favourite City</label><br>
                <input type="checkbox" id="City" value="Manila">Manila<br>
                <input type="checkbox" id="City" value="Bicol">Bicol<br><br>

                <label>Favourite Food</label><br>
                <input type="checkbox" id="food" value="Sushi">Sushi<br>
                <input type="checkbox" id="food" value="Alfredo Pasta">Alfredo Pasta<br>
                <input type="checkbox" id="food" value="Mochi">Mochi<br>
                <input type="checkbox" id="food" value="Ice cream">Ice cream<br>
                <input type="checkbox" id="food" value="Chicken">Chicken<br><br>

                <label>Birthday:</label>
                <input type="date" id="Birthday" name="Birthday"><br><br>
                
                <input type="Submit">
    </body>
</html>
