<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L10 My Food Menu</title>

        <style>
            body {
                font-family:Arial;
                background: #fff8ff;
                padding: 30px;
                text-align: center;
            }
            
            h1 { color: #e65c00; }
            
            /* Sibling Selector - styles the paragraph right after h1 */
            h1, p {
                background:#ffe0b2;
                padding: 10px 20px;
                border-radius: 8px;
                color:#bf360c;
                display:inline-block;
            }

            ul { padding:0; margin-top:20px; }
            
            /*child selector - styles only direct li children of ul */
            u1 > li {
                list-style:none;
                font: size 18px;
                font-weight:bold;
                color: #5d4037;
                padding: 10px 20px;
                margin: 6px auto;
                width: 260px;
                background: #fff3e0;
                border: radius 8px;
            }

            /*:nth-child - highlights the third item as Chef's Special */
            ul li:nth-child(3) {
                background: #ffe082;
                color: #e65c00;
            }


        </style>
    </head>
    <body>
        <h1>My Food Menu</h1>  
        <p>Pick your favorite dish and dig in!</p>

        <ul>
            <li>Pizza</li>
            <li>Burger</li>
            <li>Taco - Chef's Special</li>
            <li>Noodles</li>
            <li>Ice Cream</li>
        </ul>

        <p class="desc">
            Every dish on this menu is made with love and loads of flavour. 
            Try them all and find your favourite!
        </p>
         
        <div class="links">
            <a href="#">Order Now<a/>
            <a href="#">See More<a/>
        </div>

    </body>
</html>
