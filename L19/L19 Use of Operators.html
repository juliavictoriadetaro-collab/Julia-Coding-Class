<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L19 Use of Operators</title>
    </head>
    <body>
        <h2> Operator </h2>
        <p id="demo"></p>
        <p id="demo2"></p>
        <p id="demo3"></p>

        <script>
            //*use +, -, *, / operators*//
            var x = 5;
            var y = 2;

            //addition
            var z = x + y;
            document.getElementById("demo").innerHTML = z;

            //subtraction
            var a = x - y;
            document.getElementById("demo2").innerHTML = a;

            

            // assignment operator
            x +=4;
            document.getElementById("demo3").innerHTML = x;



        </script>
    </body>
</html>
